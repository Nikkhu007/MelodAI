<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary Meta -->
    <title>MelodAI — AI Music Streaming</title>
    <meta name="description" content="AI-powered music streaming with YouTube, mood radio, synced lyrics and more" />
    <meta name="theme-color" content="#6c47ff" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/ico" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS PWA fullscreen support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MelodAI" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="MelodAI" />

    <!-- Open Graph (looks good when shared on WhatsApp) -->
    <meta property="og:title"       content="MelodAI — AI Music Streaming" />
    <meta property="og:description" content="Stream any song, set your mood, get AI recommendations" />
    <meta property="og:type"        content="website" />
    <meta property="og:image"       content="/pwa-512.png" />

    <!-- Preload fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://picsum.photos" />

    <!-- Prevent flash of unstyled content -->
    <style>
      html, body { background: #0a0a0f; margin: 0; padding: 0; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
